<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 485" font-family="system-ui, -apple-system, sans-serif">
  <rect width="440" height="485" fill="white"/>

  <!-- Source code container -->
  <rect x="20" y="10" width="400" height="170" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="220" y="30" text-anchor="middle" font-size="10" font-weight="bold" fill="#94a3b8">SOURCE CODE</text>

  <!-- Game -->
  <rect x="40" y="40" width="360" height="38" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">COOPLA</text>
  <text x="220" y="69" text-anchor="middle" font-size="9" fill="#475569">Game</text>

  <!-- Engine -->
  <rect x="40" y="88" width="360" height="38" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="220" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">TERRA</text>
  <text x="220" y="117" text-anchor="middle" font-size="9" fill="#475569">Engine</text>

  <!-- Libraries -->
  <rect x="40" y="136" width="360" height="38" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">LIBRARIES</text>
  <text x="220" y="165" text-anchor="middle" font-size="9" fill="#475569">Open Source</text>

  <!-- Fork labels -->
  <text x="120" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#64748b">make run</text>
  <text x="320" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#64748b">make web</text>

  <!-- Fork arrows from container -->
  <line x1="120" y1="180" x2="120" y2="188" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="120" y1="205" x2="120" y2="225" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="116,222 120,229 124,222" fill="#94a3b8"/>
  <line x1="320" y1="180" x2="320" y2="188" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="320" y1="205" x2="320" y2="225" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="316,222 320,229 324,222" fill="#94a3b8"/>

  <!-- Native compiler -->
  <rect x="30" y="230" width="180" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">gcc / clang</text>
  <text x="120" y="261" text-anchor="middle" font-size="9" fill="#475569">native C compiler</text>

  <!-- Web compiler -->
  <rect x="230" y="230" width="180" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">Emscripten</text>
  <text x="320" y="261" text-anchor="middle" font-size="9" fill="#475569">C → WebAssembly compiler</text>

  <!-- Arrows down -->
  <line x1="120" y1="270" x2="120" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="116,297 120,304 124,297" fill="#94a3b8"/>
  <line x1="320" y1="270" x2="320" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="316,297 320,304 324,297" fill="#94a3b8"/>

  <!-- Native output -->
  <rect x="30" y="305" width="180" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Native binary</text>
  <text x="120" y="336" text-anchor="middle" font-size="9" fill="#475569">macOS / Linux / Windows</text>

  <!-- Web output -->
  <rect x="230" y="305" width="180" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">WebAssembly</text>
  <text x="320" y="336" text-anchor="middle" font-size="9" fill="#475569">.wasm + .js + .data (~1MB total)</text>

  <!-- Arrows down -->
  <line x1="120" y1="345" x2="120" y2="375" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="116,372 120,379 124,372" fill="#94a3b8"/>
  <line x1="320" y1="345" x2="320" y2="375" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="316,372 320,379 324,372" fill="#94a3b8"/>

  <!-- Native runtime -->
  <rect x="30" y="380" width="180" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">OpenGL 3.3</text>
  <text x="120" y="411" text-anchor="middle" font-size="9" fill="#475569">desktop GPU</text>

  <!-- Web runtime -->
  <rect x="230" y="380" width="180" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">WebGL 2.0</text>
  <text x="320" y="411" text-anchor="middle" font-size="9" fill="#475569">any modern browser</text>

  <!-- Demo flags note on web side -->
  <rect x="230" y="430" width="180" height="45" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
  <text x="320" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">#ifdef DEMO_BUILD</text>
  <text x="320" y="462" text-anchor="middle" font-size="9" fill="#64748b">restricted abilities &amp; no debug keys</text>
  <line x1="320" y1="420" x2="320" y2="430" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3"/>
</svg>
