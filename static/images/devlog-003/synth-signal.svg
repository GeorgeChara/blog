<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="system-ui, -apple-system, sans-serif">
  <rect width="500" height="220" fill="white"/>

  <text x="250" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">SIGNAL FLOW</text>

  <!-- Oscillators -->
  <rect x="15" y="30" width="65" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="47" y="48" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e3a5f">OSC</text>
  <text x="47" y="60" text-anchor="middle" font-size="7" fill="#475569">Saw / Square / Sine</text>
  <text x="47" y="72" text-anchor="middle" font-size="7" fill="#64748b">+ Sub + Detune</text>

  <line x1="80" y1="65" x2="100" y2="65" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="97,61 105,65 97,69" fill="#94a3b8"/>

  <!-- Mix -->
  <rect x="105" y="40" width="50" height="32" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="130" y="55" text-anchor="middle" font-size="8" font-weight="bold" fill="#475569">MIX</text>
  <text x="130" y="65" text-anchor="middle" font-size="7" fill="#64748b">+ Noise</text>

  <line x1="155" y1="56" x2="180" y2="56" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="177,52 185,56 177,60" fill="#94a3b8"/>

  <!-- Filter -->
  <rect x="185" y="30" width="70" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="220" y="48" text-anchor="middle" font-size="9" font-weight="bold" fill="#14532d">FILTER</text>
  <text x="220" y="60" text-anchor="middle" font-size="7" fill="#475569">LP / HP / BP</text>
  <text x="220" y="70" text-anchor="middle" font-size="7" fill="#475569">Diode Ladder</text>
  <text x="220" y="82" text-anchor="middle" font-size="7" fill="#64748b">Cutoff + Reso</text>

  <line x1="255" y1="65" x2="275" y2="65" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="272,61 280,65 272,69" fill="#94a3b8"/>

  <!-- Distortion -->
  <rect x="280" y="42" width="55" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="307" y="57" text-anchor="middle" font-size="8" font-weight="bold" fill="#78350f">DRIVE</text>
  <text x="307" y="68" text-anchor="middle" font-size="7" fill="#64748b">tanh clip</text>

  <line x1="335" y1="60" x2="355" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="352,56 360,60 352,64" fill="#94a3b8"/>

  <!-- AMP -->
  <rect x="360" y="42" width="50" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="385" y="57" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e3a5f">AMP</text>
  <text x="385" y="68" text-anchor="middle" font-size="7" fill="#64748b">Envelope</text>

  <line x1="410" y1="60" x2="430" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="427,56 435,60 427,64" fill="#94a3b8"/>

  <!-- Output -->
  <rect x="435" y="42" width="50" height="35" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="62" text-anchor="middle" font-size="9" font-weight="bold" fill="#14532d">OUT</text>

  <!-- Effects -->
  <rect x="360" y="110" width="125" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="422" y="126" text-anchor="middle" font-size="9" font-weight="bold" fill="#475569">EFFECTS</text>
  <text x="422" y="138" text-anchor="middle" font-size="7" fill="#475569">Delay + Reverb</text>
  <text x="422" y="150" text-anchor="middle" font-size="7" fill="#64748b">Time + Feedback + Room</text>

  <line x1="422" y1="77" x2="422" y2="105" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="418,102 422,110 426,102" fill="#94a3b8"/>

  <!-- Modulation -->
  <rect x="15" y="125" width="70" height="38" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="50" y="141" text-anchor="middle" font-size="8" font-weight="bold" fill="#78350f">FILT ENV</text>
  <text x="50" y="153" text-anchor="middle" font-size="7" fill="#64748b">ATT DEC SUS REL</text>

  <rect x="100" y="125" width="55" height="38" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="127" y="141" text-anchor="middle" font-size="8" font-weight="bold" fill="#78350f">LFO</text>
  <text x="127" y="153" text-anchor="middle" font-size="7" fill="#64748b">Sin Saw Sqr</text>

  <line x1="50" y1="125" x2="210" y2="100" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3"/>
  <polygon points="207,96 213,102 206,102" fill="#f59e0b"/>
  <text x="120" y="108" font-size="7" fill="#f59e0b">mod cutoff</text>
  <line x1="127" y1="125" x2="220" y2="100" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3"/>

  <!-- Sequencer -->
  <rect x="15" y="180" width="150" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="90" y="198" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e3a5f">SEQUENCER</text>
  <text x="200" y="198" font-size="7" fill="#64748b">16 steps · 4 patterns · swing · accent · slide</text>
</svg>
